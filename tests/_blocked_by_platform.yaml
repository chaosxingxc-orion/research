# RIA Red-Status Mapping (v1.1)
#
# Maps integration / conformance test globs to platform wave-IDs that
# would unblock them. Consumed by:
#   - ria/observability/red_status.py (emitter; sub-wave 3)
#   - check tooling for red-status JSON schema validation (G-RIA-12)
#
# Schema:
#   - test_glob: pytest glob (string or list)
#   - blocked_by_wave_id: hi-agent wave acceptance ID (e.g. "W36-A4-LINEAGE")
#   - blocked_by_short: <= 100 chars human description
#   - first_observed_ria_head: optional sha for "stale red" tracking
#
# Per RIA architecture v2 §5.6 schema v1.1, the field name is
# `blocked_by_wave_id` (wave-agnostic); the legacy `blocked_by_w34_id` field
# is retired (was renamed in v2.0.1 erratum 2026-05-05).

